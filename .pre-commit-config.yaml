---
# Official pre-commit hook repositories (pinned revs).
# Run: pre-commit install && pre-commit run --all-files
default_install_hook_types: [pre-commit]
default_stages: [pre-commit]

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.11
    hooks:
      - id: ruff-check
      - id: ruff-format

  # ShellCheck: Docker-based official hook is koalaman/shellcheck-precommit.
  # shellcheck-py bundles the ShellCheck binary (no Docker).
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.9.0.6
    hooks:
      - id: shellcheck

  - repo: https://github.com/adrienverge/yamllint
    rev: v1.38.0
    hooks:
      - id: yamllint

  - repo: https://github.com/antonbabenko/pre-commit-terraform
    rev: v1.99.5
    hooks:
      - id: terraform_fmt
      - id: terraform_validate
      - id: terraform_tflint
