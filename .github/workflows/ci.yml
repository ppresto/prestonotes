name: CI

on:
  push:
    branches: [main, phase3]
  pull_request:
    branches: [main, phase3]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Sync Python (workspace)
        run: uv sync --all-groups

      - name: Repo integrity manifest
        run: bash scripts/ci/check-repo-integrity.sh

      - name: No embedded GDoc file ids in docs (TASK-052 §0.6)
        run: bash scripts/ci/check-docs-no-embedded-gdoc-file-ids.sh

      - name: Tests
        run: uv run pytest

      - name: Call-record lint (guarded — _TEST_CUSTOMER fixture only)
        run: |
          if [ -d "MyNotes/Customers/_TEST_CUSTOMER/call-records" ]; then
            uv run python -m prestonotes_mcp.call_records lint _TEST_CUSTOMER
          else
            echo "skip: MyNotes/Customers/_TEST_CUSTOMER not materialized; lint is a no-op here"
          fi

      - name: Pre-commit
        run: uv run pre-commit run --all-files
