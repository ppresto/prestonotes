name: CI

on:
  push:
    branches: [main, phase3]
  pull_request:
    branches: [main, phase3]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Sync Python (workspace)
        run: uv sync --all-groups

      - name: Repo integrity manifest
        run: bash scripts/ci/check-repo-integrity.sh

      - name: Tests
        run: uv run pytest

      - name: Pre-commit
        run: uv run pre-commit run --all-files
