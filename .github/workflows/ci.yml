name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Sync Python workspace
        run: uv sync --all-groups

      - name: Pre-commit & Linters
        run: uv run pre-commit run --all-files

      - name: Lint E2E Test Data (_TEST_CUSTOMER)
        run: |
          if [ -d "MyNotes/Customers/_TEST_CUSTOMER/call-records" ]; then
            uv run python -m prestonotes_mcp.call_records lint _TEST_CUSTOMER
          else
            echo "skip: Test data not materialized; lint is a no-op."
          fi