      enabled: true
      guidance:
        - "When notes mention internal or homegrown scanners/platforms, map to custom_internal_tool."
        - "Capture explicit function in detail (for example vuln aggregation, policy automation, reporting)."
        - "Do not invent vendor names; keep custom tooling clearly labeled as internal."

update_from_evidence:
  enabled: true
  llm_first: true
  llm_required: true
  dedupe_policy:
    canonical_per_theme: true
    require_theme_key: true
    compare_against_existing_doc: true
    on_duplicate: "prefer_detail_update_over_duplicate_add"
    guidance: "Use one canonical tool mutation per theme. When context evolves for an existing tool, prefer update_tool_detail instead of a second add_tool."

  allowed_actions:
    - "update_in_place"
    - "add_tool"
    - "update_tool_detail"
    - "remove_tool_suggestion"

  allowed_tool_fields:
    - "platforms"
    - "devops_vcs"
    - "security_tools"
    - "aspm_tools"
    - "ticketing"
    - "languages"
  allowed_update_fields:
    - "csp_regions"
    - "idp_sso"
    - "sizing"

  guardrails:
    section_intent: "active_tooling_environment_only"
    concise_detail_required: false
    stable_tool_key_required: true
    avoid_duplicate_tools: true
    remove_is_optional: true
    detail_cap_control: "llm_prompt_controlled"
