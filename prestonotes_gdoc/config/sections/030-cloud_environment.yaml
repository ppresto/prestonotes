version: 1

managed_by: "planner"
section_key: "cloud_environment"

runtime:
  enabled: true
  llm_first: true
  llm_required: true

mutation_contract:
  section_type: "tools_and_fields"
  allowed_actions:
    - "update_in_place"
    - "add_tool"
    - "update_tool_detail"
    - "remove_tool_suggestion"
  required_fields_by_action:
    update_in_place:
      - field_key
      - new_value
    add_tool:
      - field_key
      - tool_key
      - display_name
    update_tool_detail:
      - field_key
      - tool_key
    remove_tool_suggestion:
      - field_key
      - tool_key
  allowed_enums:
    field_key:
      - "csp_regions"
      - "platforms"
      - "idp_sso"
      - "devops_vcs"
      - "security_tools"
      - "aspm_tools"
      - "ticketing"
      - "languages"
      - "sizing"

dedupe_policy:
  canonical_per_theme: true
  require_theme_key: true
  compare_against_existing_doc: true
  on_duplicate: "prefer_detail_update_over_duplicate_add"
  guidance: "Use one canonical tool mutation per theme. When context evolves for an existing tool, prefer update_tool_detail instead of a second add_tool."

quality_gates:
  intent: "active_tooling_environment_context_only"
  cross_section_leakage_block: true

section_extensions:
  tool_field_map_ref: "update_from_evidence.allowed_tool_fields"
  update_field_map_ref: "update_from_evidence.allowed_update_fields"
  guardrails_ref: "update_from_evidence.guardrails"
